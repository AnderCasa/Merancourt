<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasyon Pri - Merancourt</title>
</head>
<body style="text-align: center; font-family: Arial, sans-serif; margin-top: 60px; background-color: #f4f6f9;">

    <div style="max-width: 350px; margin: auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1);">
        <h3 style="color: #8B4513; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;">MERANCOURT</h3>
        <p style="font-size: 12px; color: #777; margin-top: 0;">Sistèm Verifikasyon Pri</p>
        <hr style="border: 0; height: 1px; background: #e0e0e0; margin: 20px 0;">

        <h1 id="nom-produit" style="color: #333; font-size: 24px; margin-bottom: 5px;">Chache pwodwi...</h1>
        <p id="kod-produit" style="font-size: 14px; color: #999; margin-top: 0;">-</p>

        <div style="background-color: #ebf7ee; padding: 15px; border-radius: 10px; margin: 25px 0;">
            <h2 id="prix-produit" style="font-size: 45px; color: #27ae60; margin: 0;">-</h2>
        </div>
    <script>
        // KOPYE EPI KOLE LYEN .CSV GOOGLE SHEET PA W LAN LA NAN MITAN APWOSTWOF YO:
        const GOOGLE_SHEET_CSV_URL = https:'//docs.google.com/spreadsheets/d/e/2PACX-1vSz2w9MwD4sl9HUEAGulTEoerDOV6pKirCs_-6flmYaa_dR-pEZ0A97m_dS8hKNWSgbMWoSZASpJGZA/pub?output=csv';

        // Rekipere kòd ba ki nan URL la
        const urlParams = new URLSearchParams(window.location.search);
        const barcodeParam = urlParams.get('code');

        if (!barcodeParam) {
            document.getElementById('nom-produit').innerText = "Kòd manke nan lyen an";
            document.getElementById('prix-produit').innerText = "Erè";
            document.getElementById('prix-produit').style.color = "red";
        } else {
            // Al chache done yo an dirèk nan Google Sheet la
            fetch(GOOGLE_SHEET_CSV_URL)
                .then(response => response.text())
                .then(csvText => {
                    const lines = csvText.split('\n');
                    let produitTrouve = null;

                    // Sote premye liy lan (tèt kolòn yo), kòmanse nan i = 1
                    for (let i = 1; i < lines.length; i++) {
                        // Netwaye liy lan pou evite pwoblèm gilmè (quotes) Google mete yo
                        const row = lines[i].replace(/"/g, '').split(',');
                        
                        if (row.length >= 3) {
                            const currentBarcode = row[0].trim();
                            if (currentBarcode === barcodeParam.trim()) {
                                produitTrouve = {
                                    nom: row[1].trim(),
                                    prix: row[2].trim()
                                };
                                break;
                            }
                        }
                    }

                    // Afiche rezilta a
                    if (produitTrouve) {
                        document.getElementById('nom-produit').innerText = produitTrouve.nom;
                        document.getElementById('kod-produit').innerText = "Kòd: " + barcodeParam;
                        document.getElementById('prix-produit').innerText = produitTrouve.prix;
                    } else {
                        document.getElementById('nom-produit').innerText = "Pwodwi sa a pa egziste";
                        document.getElementById('prix-produit').innerText = "N/A";
                        document.getElementById('prix-produit').style.color = "red";
                    }
                })
                .catch(err => {
                    document.getElementById('nom-produit').innerText = "Erè Koneksyon Sèvè";
                    console.error(err);
                });
        }
    </script>
</body>
</html>
